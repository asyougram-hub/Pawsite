<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
name="description"
content="PawMatch helps pet owners find playdates, friends and companions for their pets.">
    <title>PawMatch - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="paw.jpg">
</head>
<body class="auth-page">
<main class="auth-wrapper">
<div class="container">
    <!-- LEFT SIDE -->
    <div class="left-side">
        <div class="overlay"></div>
        <div class="slider">
            <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1000&auto=format&fit=crop"
            class="slide">
            <img src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?q=80&w=1000&auto=format&fit=crop"
            class="slide">
            <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?q=80&w=1000&auto=format&fit=crop"
            class="slide">
        </div>
        <div class="left-content">
            <h1>🐾 PawMatch</h1>
            <p>Swipe. Match. Make Pet Friends ❤️</p>
        </div>
    </div>
    <!-- RIGHT SIDE -->
    <div class="right-side">

        <div class="form-box">

            <div class="title">
                <h1>LOGIN</h1>
                <p>Welcome Back!</p>
            </div>

            <form
    id="loginForm"
    action="https://petmatch-mu.vercel.app/api/auth/login"
    method="POST"
>

                <label for="email">Email </label>
                <input type="text" id="email" autocomplete="email" placeholder="Enter email or phone" required>

                <label for="password">Password</label>
                <input type="password" id="password"  autocomplete="current-password" placeholder="Enter password" required>

                <div class="extra-options">

                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <a href="forgot-password.html">Forgot Password?</a>

                </div>
                <div id="loginErrorMsg"></div>
                <button type="submit" id="loginBtn">Login</button>
            </form>

            <div class="bottom-text">
                Don't have an account?
                <a href="signup.html">Sign Up</a>
            </div>

        </div>

    </div>
    </main>
    <footer class="auth-footer">
    <div>
      <h3>PawMatch</h3>
      <p>Find friends for your furry companion.</p>
    </div>

    <div>
      <h4>Product</h4>
      <a href="index.html">Home</a>
      <a href="discover.html">Features</a>
    </div>

    <div>
      <h4>Company</h4>
      <a href="about.html">About Us</a>
      
    </div>

    <div>
      <h4>Legal</h4>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      
    </div>

    <p class="footer-copy">© 2026 PawMatch • Made with ❤️ for pet lovers</p>
  </footer>

<script src="login.js"></script>
</div>
</body>
</html>
