<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PawMatch · reset-password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PawMatch helps pet owners find playdates, friends and companions for their pets.">  
    <link rel="icon" href="paw.jpg">
    <link rel="stylesheet" href="main.css">
</head>
<body>
   <form id="resetForm">

    <input
        type="password"
        id="newPassword"
        placeholder="New Password"
        required
    >

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password"
        required
    >

    <button type="submit">
        Reset Password
    </button>

    <div id="msg"></div>

</form>

<script src="reset-password.js"></script>
    
</body>
</html>
